<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Glow & Gloss</title>
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Google Sign-In -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>

<body class="bg-light">

    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white sticky-top shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <span class="brand-text">Glow & Gloss</span>
            </a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="products.html">Products</a></li>
                    <li class="nav-item"><a class="nav-link" href="orders.html">My Orders</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="form-container">
            <div class="text-center mb-5">
                <h2 class="fw-bold">Welcome Back</h2>
                <p class="text-muted">Login to your Glow & Gloss account.</p>
            </div>
            <form id="login-form" novalidate>
                <div class="mb-3">
                    <label class="form-label small text-uppercase fw-bold">Email Address</label>
                    <input type="email" id="login-email" class="form-control" placeholder="john@example.com" required>
                    <div class="invalid-feedback">Please enter a valid email.</div>
                </div>
                <div class="mb-4">
                    <div class="d-flex justify-content-between">
                        <label class="form-label small text-uppercase fw-bold">Password</label>
                        <a href="#" class="small text-muted text-decoration-none">Forgot?</a>
                    </div>
                    <input type="password" id="login-password" class="form-control" required>
                    <div class="invalid-feedback">Please enter your password.</div>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-3">Login</button>
                <div class="text-center my-3">
                    <span class="text-muted small">OR</span>
                </div>
                <div id="g_id_onload"
                    data-client_id="342923212429-2n5q28m7nn03ft1v794mg15f97p37gln.apps.googleusercontent.com"
                    data-context="signin" data-ux_mode="popup" data-callback="handleCredentialResponse"
                </div>
                <div class="g_id_signin" data-type="standard" data-shape="rectangular" data-theme="outline"
                    data-text="signin_with" data-size="large" data-logo_alignment="left">
                </div>
            </form>
            <div class="text-center mt-4">
                <p class="small text-muted">Don't have an account? <a href="register.html"
                        class="text-dark fw-bold">Register</a></p>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <div id="footer-placeholder"></div>

    <!-- Google Login Mock Modal -->
    <div class="modal fade" id="googleModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered" style="max-width: 400px;">
            <div class="modal-content border-0 shadow-lg">
                <div class="modal-body p-4 text-center">
                    <img src="https://www.google.com/favicon.ico" width="40" class="mb-3">
                    <h5 class="fw-bold">Choose an account</h5>
                    <p class="text-muted small">to continue to Glow & Gloss</p>

                    <div class="list-group list-group-flush mt-4 text-start">
                        <button
                            class="list-group-item list-group-item-action d-flex align-items-center py-3 border-top google-acc-select"
                            data-email="beauty.pro@gmail.com" data-name="Beauty Professional">
                            <div class="rounded-circle bg-primary text-white d-flex align-items-center justify-content-center me-3"
                                style="width: 32px; height: 32px;">B</div>
                            <div>
                                <div class="fw-bold small">Beauty Professional</div>
                                <div class="text-muted" style="font-size: 0.75rem;">beauty.pro@gmail.com</div>
                            </div>
                        </button>
                        <button
                            class="list-group-item list-group-item-action d-flex align-items-center py-3 google-acc-select"
                            data-email="customer.test@gmail.com" data-name="John Doe">
                            <div class="rounded-circle bg-danger text-white d-flex align-items-center justify-content-center me-3"
                                style="width: 32px; height: 32px;">J</div>
                            <div>
                                <div class="fw-bold small">John Doe</div>
                                <div class="text-muted" style="font-size: 0.75rem;">customer.test@gmail.com</div>
                            </div>
                        </button>
                        <button
                            class="list-group-item list-group-item-action d-flex align-items-center py-3 text-muted small border-bottom"
                            id="custom-google-acc">
                            <i class="fas fa-user-circle me-3"></i> Use another account
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    </div>

    <!-- Scripts -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
    <script>
        function handleCredentialResponse(response) {
            // Decode the JWT token to get user info
            const responsePayload = decodeJwtResponse(response.credential);
            const user = {
                name: responsePayload.name,
                email: responsePayload.email,
                picture: responsePayload.picture,
                role: 'customer',
                id: 'google-' + responsePayload.sub
            };
            sessionStorage.setItem('currentUser', JSON.stringify(user));
            alert('Signed in with Google! Welcome, ' + user.name);
            window.location.href = 'index.html';
        }

        function decodeJwtResponse(token) {
            var base64Url = token.split('.')[1];
            var base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            var jsonPayload = decodeURIComponent(atob(base64).split('').map(function (c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));
            return JSON.parse(jsonPayload);
        }

        $(document).ready(function () {
            $('#google-login').on('click', function () {
                var myModal = new bootstrap.Modal(document.getElementById('googleModal'));
                myModal.show();
            });

            $('.google-acc-select').on('click', function () {
                const name = $(this).data('name');
                const email = $(this).data('email');
                const mockUser = {
                    name: name,
                    email: email,
                    role: 'customer',
                    id: 'google-' + Date.now()
                };
                sessionStorage.setItem('currentUser', JSON.stringify(mockUser));
                alert('Signed in with Google! Welcome, ' + name);
                window.location.href = 'index.html';
            });

            $('#custom-google-acc').on('click', function () {
                const userEmail = prompt("Enter your Google email:");
                if (userEmail) {
                    const userName = userEmail.split('@')[0];
                    const mockUser = {
                        name: userName.charAt(0).toUpperCase() + userName.slice(1),
                        email: userEmail,
                        role: 'customer',
                        id: 'google-' + Date.now()
                    };
                    sessionStorage.setItem('currentUser', JSON.stringify(mockUser));
                    alert('Signed in with Google! Welcome, ' + mockUser.name);
                    window.location.href = 'index.html';
                }
            });
        });
    </script>
    <script src="config.js"></script>
</body>

</html>
