<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Glow & Gloss</title>
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body class="bg-light">

    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white sticky-top shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <span class="brand-text">Glow & Gloss</span>
            </a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="products.html">Products</a></li>
                    <li class="nav-item"><a class="nav-link" href="orders.html">My Orders</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="form-container">
            <div class="text-center mb-5">
                <h2 class="fw-bold">Create Account</h2>
                <p class="text-muted">Join the Glow & Gloss community.</p>
            </div>
            <form id="registration-form" novalidate>
                <div class="mb-3">
                    <label class="form-label small text-uppercase fw-bold">Full Name</label>
                    <input type="text" id="reg-name" class="form-control" placeholder="John Doe" required>
                    <div class="invalid-feedback">Please enter your full name.</div>
                </div>
                <div class="mb-3">
                    <label class="form-label small text-uppercase fw-bold">Email Address</label>
                    <input type="email" id="reg-email" class="form-control" placeholder="john@example.com" required>
                    <div class="invalid-feedback">Please enter a valid email.</div>
                </div>
                <div class="mb-3">
                    <label class="form-label small text-uppercase fw-bold">User Type</label>
                    <select id="reg-role" class="form-select rounded-0" required>
                        <option value="">Select Role</option>
                        <option value="distributor" selected>Distributor</option>
                        <option value="retailer">Retailer</option>
                        <option value="customer">Customer</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label small text-uppercase fw-bold">Password</label>
                    <input type="password" id="reg-password" class="form-control" placeholder="Min 6 characters"
                        required>
                    <div class="invalid-feedback">Password must be at least 6 characters.</div>
                </div>
                <div class="mb-4">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="terms" required>
                        <label class="form-check-label small text-muted" for="terms">
                            I agree to the Terms & Conditions
                        </label>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-3">Register Now</button>
            </form>
            <div class="text-center mt-4">
                <p class="small text-muted">Already have an account? <a href="login.html"
                        class="text-dark fw-bold">Login</a></p>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <div id="footer-placeholder"></div>

    <!-- Scripts -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="config.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
