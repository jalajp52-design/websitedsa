<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | Glow & Gloss</title>
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8f9fa;
        }

        .form-label {
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #6c757d;
        }

        .form-control,
        .form-select {
            border-radius: 0;
            padding: 0.75rem 1rem;
            border-color: #dee2e6;
        }

        .form-control:focus,
        .form-select:focus {
            box-shadow: none;
            border-color: #667eea;
        }

        .checkout-summary {
            background: white;
            padding: 2rem;
            box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.05);
        }

        .order-item img {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 4px;
        }
    </style>
</head>

<body>

    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white sticky-top shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <span class="brand-text"
                    style="font-family: 'Playfair Display', serif; font-weight: 700; font-size: 1.5rem; background: linear-gradient(45deg, #ff6b6b, #feca57); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Glow
                    & Gloss</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="products.html">Products</a></li>
                    <li class="nav-item"><a class="nav-link" href="orders.html">My Orders</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Page Header -->
    <section class="py-5 bg-white border-bottom">
        <div class="container text-center">
            <h1 class="display-5 fw-bold">Checkout</h1>
            <p class="text-muted">Complete your purchase safely and securely.</p>
        </div>
    </section>

    <!-- Checkout Content -->
    <section class="py-5">
        <div class="container">
            <div class="row g-5">
                <!-- Left Column: Forms -->
                <div class="col-lg-7">
                    <h4 class="mb-4 fw-bold">Shipping Details</h4>
                    <form id="checkout-form">
                        <div class="row g-3">
                            <div class="col-sm-6">
                                <label for="firstName" class="form-label">First name</label>
                                <input type="text" class="form-control" id="firstName">
                            </div>
                            <div class="col-sm-6">
                                <label for="lastName" class="form-label">Last name</label>
                                <input type="text" class="form-control" id="lastName">
                            </div>

                            <div class="col-12">
                                <label for="email" class="form-label">Email</label>
                                <input type="email" class="form-control" id="email">
                                <!-- Pre-fill if logged in -->
                            </div>

                            <div class="col-12">
                                <label for="phone" class="form-label">Phone</label>
                                <input type="tel" class="form-control" id="phone">
                            </div>

                            <div class="col-12">
                                <label for="address" class="form-label">Address</label>
                                <input type="text" class="form-control" id="address" placeholder="1234 Main St">
                            </div>

                            <div class="col-12">
                                <label for="address2" class="form-label">Address 2 <span
                                        class="text-muted">(Optional)</span></label>
                                <input type="text" class="form-control" id="address2" placeholder="Apartment or suite">
                            </div>

                            <div class="col-12">
                                <label for="city" class="form-label">City</label>
                                <input type="text" class="form-control" id="city">
                            </div>

                            <div class="col-md-5">
                                <label for="country" class="form-label">Country</label>
                                <select class="form-select" id="country">
                                    <option value="">Choose...</option>
                                    <option value="United States">india</option>
                                    <option value="Canada">nepal</option>
                                    <option value="United Kingdom">united kigdom</option>
                                    

                                </select>
                            </div>

                            <div class="col-md-4">
                                <label for="state" class="form-label">State</label>
                                <select class="form-select" id="state">
                                    <option value="">Choose...</option>
                                    <option value="California">div</option>
                                    <option value="New York">damn</option>
                                    <option value="Texas">goa</option>
                                </select>
                            </div>

                            <div class="col-md-3">
                                <label for="zip" class="form-label">Zip</label>
                                <input type="text" class="form-control" id="zip">
                            </div>
                        </div>

                        <hr class="my-5">

                        <h4 class="mb-4 fw-bold">Payment</h4>
                        <div class="my-3">
                            <div class="form-check">
                                <input id="credit" name="paymentMethod" type="radio" class="form-check-input" checked>
                                <label class="form-check-label" for="credit">Credit card</label>
                            </div>
                            <div class="form-check">
                                <input id="debit" name="paymentMethod" type="radio" class="form-check-input">
                                <label class="form-check-label" for="debit">Debit card</label>
                            </div>
                            <div class="form-check">
                                <input id="paypal" name="paymentMethod" type="radio" class="form-check-input">
                                <label class="form-check-label" for="paypal">smart card</label>
                            </div>
                        </div>

                        <div class="row gy-3">
                            <div class="col-md-6">
                                <label for="cc-name" class="form-label">Name on card</label>
                                <input type="text" class="form-control" id="cc-name" required>
                                <small class="text-muted">Full name as displayed on card</small>
                            </div>
                            <div class="col-md-6">
                                <label for="cc-number" class="form-label">Credit card number</label>
                                <input type="text" class="form-control" id="cc-number" required>
                            </div>
                            <!-- Removed Expiration and CVV fields as requested -->
                        </div>

                        <button class="btn btn-primary btn-lg w-100 mt-5 rounded-0" type="submit">Place Order</button>
                    </form>
                </div>
            </div>

            <!-- Right Column: Summary -->
            <div class="col-lg-5">
                <div class="checkout-summary sticky-top" style="top: 100px;">
                    <h4 class="d-flex justify-content-between align-items-center mb-4">
                        <span class="fw-bold">Your Cart</span>
                        <span class="badge bg-primary rounded-pill cart-count-badge">0</span>
                    </h4>
                    <ul class="list-group list-group-flush mb-3" id="checkout-cart-list">
                        <!-- Items injected by JS -->
                    </ul>
                    <div class="d-flex justify-content-between p-3 bg-light">
                        <span class="fw-bold">Total (USD)</span>
                        <strong id="checkout-total">$0.00</strong>
                    </div>
                </div>
            </div>
        </div>
        </div>
    </section>

    <!-- Footer -->
    <div id="footer-placeholder"></div>

    <!-- Scripts -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="config.js"></script>
    <script src="js/main.js"></script>
    <script>
        $(document).ready(function () {
            // 1. Load Cart
            const cart = JSON.parse(localStorage.getItem('cart') || '[]');
            const $cartList = $('#checkout-cart-list');
            const $total = $('#checkout-total');
            const $badge = $('.cart-count-badge');
            
            let totalAmount = 0;
            let totalCount = 0;

            if (cart.length === 0) {
                $cartList.html('<li class="list-group-item text-center">Your cart is empty.</li>');
                $('button[type="submit"]').prop('disabled', true);
            } else {
                $cartList.empty();
                cart.forEach(item => {
                    const itemTotal = item.price * item.quantity;
                    totalAmount += itemTotal;
                    totalCount += item.quantity;
                    
                    $cartList.append(`
                        <li class="list-group-item d-flex justify-content-between lh-sm">
                            <div>
                                <h6 class="my-0">${item.name}</h6>
                                <small class="text-muted">Qty: ${item.quantity}</small>
                            </div>
                            <span class="text-muted">$${itemTotal.toFixed(2)}</span>
                        </li>
                    `);
                });
            }
            
            $total.text('$' + totalAmount.toFixed(2));
            $badge.text(totalCount);
            $('.cart-count').text(totalCount); // Update navbar badge

            // 2. Pre-fill User Info
            const currentUser = JSON.parse(sessionStorage.getItem('currentUser'));
            if (currentUser) {
                $('#email').val(currentUser.email);
                if(currentUser.name) {
                    const names = currentUser.name.split(' ');
                    $('#firstName').val(names[0]);
                    $('#lastName').val(names.slice(1).join(' '));
                }
            }

            // 3. Handle Submit
            $('#checkout-form').on('submit', function (e) {
                e.preventDefault();

                if (cart.length === 0) {
                    alert('Your cart is empty!');
                    return;
                }

                const shippingDetails = {
                    firstName: $('#firstName').val(),
                    lastName: $('#lastName').val(),
                    email: $('#email').val(),
                    phone: $('#phone').val(),
                    address: $('#address').val(),
                    address2: $('#address2').val(),
                    city: $('#city').val(),
                    state: $('#state').val(),
                    zip: $('#zip').val(),
                    country: $('#country').val(),
                    paymentMethod: $('input[name="paymentMethod"]:checked').next('label').text(),
                    cardName: $('#cc-name').val(),
                    cardNumber: $('#cc-number').val()
                };

                const orderId = 'ORD-' + Date.now() + '-' + Math.floor(Math.random() * 1000);
                
                const order = {
                    orderId: orderId,
                    user: currentUser ? currentUser.email : shippingDetails.email,
                    items: cart,
                    total: totalAmount,
                    date: new Date().toISOString(),
                    status: 'Confirmed',
                    shipmentStatus: 'pending',
                    shippingDetails: shippingDetails
                };

                // Save to API
                const apiUrl = (window.API && window.API.orders) ? window.API.orders : '/api/orders';

                $.ajax({
                    url: apiUrl,
                    type: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify(order),
                    success: function (response) {
                        // Clear cart
                        localStorage.removeItem('cart');
                        // Save last order for receipt fallback
                        localStorage.setItem('lastOrder', JSON.stringify(order));
                        // Redirect
                        window.location.href = 'receipt.html?orderId=' + orderId;
                    },
                    error: function (err) {
                        console.error('Error placing order:', err);
                        // Fallback for demo purposes if API fails (e.g. no backend)
                        localStorage.removeItem('cart');
                        localStorage.setItem('lastOrder', JSON.stringify(order));
                        window.location.href = 'receipt.html?orderId=' + orderId;
                    }
                });
            });
        });
    </script>
</body>

</html>
